<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">IEEE ICC 2026 Student Travel Grant</title>
  <desc id="desc">Conference-style banner for ICC 2026 in Glasgow highlighting a student travel grant award.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="52%" stop-color="#dcecff"/>
      <stop offset="100%" stop-color="#f9fbff"/>
    </linearGradient>
    <linearGradient id="orb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3dc2ff"/>
      <stop offset="52%" stop-color="#234f9a"/>
      <stop offset="100%" stop-color="#111d4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a66c8"/>
      <stop offset="100%" stop-color="#3dc2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#8ea9d6" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1060" cy="118" r="168" fill="#cfe6ff" opacity="0.55"/>
  <circle cx="112" cy="642" r="180" fill="#d6e9ff" opacity="0.72"/>
  <path d="M0 578C202 514 374 520 530 566C699 616 856 637 1200 530V720H0Z" fill="#d9e9ff"/>
  <rect x="74" y="70" width="1052" height="580" rx="26" fill="#ffffff" filter="url(#shadow)"/>

  <g transform="translate(122 136)">
    <circle cx="92" cy="72" r="72" fill="url(#orb)"/>
    <path d="M62 26C87 23 113 33 129 52C114 46 96 44 80 49C70 52 60 58 53 66C49 58 49 47 53 39C55 34 58 29 62 26Z" fill="#ffffff" opacity="0.94"/>
    <path d="M42 73C63 63 89 62 111 72C127 79 140 92 148 108C125 100 102 99 84 103C65 108 48 118 37 132C27 112 28 88 42 73Z" fill="#ffffff" opacity="0.98"/>
  </g>

  <text x="290" y="212" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" fill="#24303f">IEEE ICC</text>
  <text x="718" y="212" font-family="Arial, Helvetica, sans-serif" font-size="74" font-weight="700" fill="#6b7280">2026</text>

  <text x="122" y="300" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1f2937">IEEE International Conference on Communications</text>
  <text x="122" y="356" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#3f4f67">24–28 May 2026 // Glasgow, Scotland, UK</text>
  <text x="122" y="404" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#3f4f67">Connected World for Sustainable Future</text>

  <rect x="122" y="458" width="428" height="10" rx="5" fill="url(#accent)"/>

  <text x="122" y="536" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#1f4c85">Student Travel Grant</text>
  <text x="122" y="590" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="500" fill="#4b5563">Awarded to Ms. Jianing Zheng for ICC 2026</text>
</svg>
